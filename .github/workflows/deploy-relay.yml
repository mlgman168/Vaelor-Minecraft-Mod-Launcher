name: Deploy Chat Relay

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - relay/**
      - render.yaml
      - .github/workflows/deploy-relay.yml

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VAELOR_RELAY_URL: ${{ secrets.VAELOR_RELAY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check relay secrets
        if: env.RENDER_DEPLOY_HOOK_URL == '' || env.VAELOR_RELAY_URL == ''
        run: |
          echo "::error::Add RENDER_DEPLOY_HOOK_URL and VAELOR_RELAY_URL repository secrets before running this workflow."
          exit 1

      - name: Trigger Render deploy
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for relay health
        run: |
          for attempt in {1..30}; do
            if curl -fsSL "$VAELOR_RELAY_URL/health"; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::Relay did not become healthy."
          exit 1

      - name: Enable relay config
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const configPath = 'relay/relay-config.json';
          const relayUrl = process.env.VAELOR_RELAY_URL.replace(/\/+$/, '');
          fs.writeFileSync(configPath, JSON.stringify({
            enabled: true,
            relayUrl,
            note: 'Vaelor clients fetch this public relay URL from GitHub.'
          }, null, 2) + '\n');
          NODE

      - name: Commit relay config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add relay/relay-config.json
          git diff --cached --quiet || git commit -m "Enable Vaelor chat relay"
          git push
